name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff check
        run: ruff check autodock

      - name: Black check
        run: black --check autodock

  # Note: Full test suite requires a conda environment with RDKit, Vina,
  # OpenMM, and other cheminformatics tools. These cannot be installed via
  # pip on GitHub Actions runners. Run tests locally:
  #   conda env create -f environment.yml
  #   conda activate autodock
  #   pytest autodock/tests/ -q

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff check
        run: ruff check autodock

      - name: Black check
        run: black --check autodock

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Open Babel)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y openbabel

      - name: Install package with docking dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docking,analysis,validation]"

      - name: Run tests
        run: pytest -v --cov=autodock --cov-report=xml --cov-fail-under=34

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew install openbabel

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docking,analysis,validation]"

      - name: Run tests
        run: pytest -v
